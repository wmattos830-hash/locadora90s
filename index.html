<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RETRO TAPES - Locadora 90s</title>
    <style>
        :root {
            --neon-pink: #ff2a6d;
            --neon-blue: #05d9e8;
            --dark-bg: #0d0221;
            --wood: #4a2f1d;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none;
        }

        canvas { display: block; }

        /* === TELA DE CARREGAMENTO === */
        #loadingScreen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }
        
        .vhs-text {
            color: #fff;
            font-size: 2rem;
            text-shadow: 2px 2px 0 var(--neon-pink), -2px -2px 0 var(--neon-blue);
            animation: glitch 0.3s infinite;
        }

        .loading-bar {
            width: 80%;
            max-width: 400px;
            height: 10px;
            background: #222;
            margin-top: 20px;
            border: 1px solid #444;
            overflow: hidden;
        }

        .loading-fill {
            width: 0%;
            height: 100%;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            animation: load 2s ease forwards;
        }

        @keyframes load { to { width: 100%; } }
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        /* === AVISO LANDSCAPE === */
        #rotateWarning {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .rotate-icon {
            width: 60px;
            height: 100px;
            border: 3px solid #fff;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: rotate 1.5s infinite;
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(0); }
            50% { transform: rotate(90deg); }
        }

        @media (max-width: 820px) and (orientation: portrait) {
            #rotateWarning { display: flex; }
        }

        /* === HUD 3D === */
        #hud {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 4px; height: 4px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
        }

        #interactionPrompt {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: var(--neon-blue);
            padding: 10px 20px;
            border: 1px solid var(--neon-blue);
            display: none;
            font-size: 0.9rem;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 0 15px rgba(5, 217, 232, 0.3);
        }

        /* === BOTÃO TELA CHEIA === */
        #fullscreenBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: inherit;
            font-size: 1.2rem;
            pointer-events: auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        /* === CONTROLES MOBILE 3D === */
        #joystickArea {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            pointer-events: auto;
        }

        #joystickKnob {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(5, 217, 232, 0.4);
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
        }

        #interactBtn {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 80px;
            height: 80px;
            background: rgba(255, 42, 109, 0.3);
            border: 2px solid var(--neon-pink);
            border-radius: 50%;
            color: #fff;
            font-family: inherit;
            font-size: 1.5rem;
            pointer-events: auto;
            display: none;
            align-items: center;
            justify-content: center;
        }

        @media (hover: hover) and (pointer: fine) {
            #joystickArea, #interactBtn { display: none !important; }
        }

        /* === OVERLAY DO ATARI (JAVATARI) === */
        #arcadeOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 900;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #javatariDiv {
            width: 100%;
            max-width: 900px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #exitArcadeBtn {
            margin-top: 20px;
            padding: 12px 30px;
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            z-index: 10;
        }

        #exitArcadeBtn:hover {
            background: var(--neon-pink);
            color: #000;
        }

        .rom-info {
            color: #fff;
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-align: center;
            padding: 0 20px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="vhs-text">CARREGANDO...</div>
        <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>

    <div id="rotateWarning">
        <div class="rotate-icon"></div>
        <h2>GIRE O CELULAR</h2>
        <p>Jogue em modo paisagem para a melhor experiência</p>
    </div>

    <!-- HUD DO JOGO 3D -->
    <div id="hud">
        <button id="fullscreenBtn">⛶</button>
        <div id="crosshair"></div>
        <div id="interactionPrompt">PRESSIONE [E] OU TOQUE EM INTERAGIR</div>
        
        <div id="joystickArea">
            <div id="joystickKnob"></div>
        </div>
        
        <button id="interactBtn">E</button>
    </div>

    <!-- OVERLAY DO FLIPERAMA (ATARI) -->
    <div id="arcadeOverlay">
        <div class="rom-info">
            ATARI 2600 EMULATOR<br>
            Arraste e solte um arquivo .bin ou .a26 aqui para jogar (se não houver ROM carregada).
        </div>
        <div id="javatariDiv"></div>
        <button id="exitArcadeBtn">SAIR DO ARCADE</button>
    </div>

    <!-- IMPORTAÇÃO DO JAVATARI -->
    <script src="https://www.javatari.org/javatari/javatari.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ========================================================
        // VARIÁVEIS GLOBAIS E CONFIGURAÇÃO INICIAL
        // ========================================================
        let scene, camera, renderer, clock;
        let isPaused = false;
        
        let player = {
            position: new THREE.Vector3(0, 1.6, 5),
            velocity: new THREE.Vector3(),
            yaw: Math.PI,
            pitch: 0,
            height: 1.6,
            radius: 0.3
        };
        
        const keys = {};
        const colliders = []; 
        let interactables = [];
        
        let joystickActive = false;
        let joystickVector = { x: 0, y: 0 };
        let touchLookId = null;
        let lastTouchX = 0, lastTouchY = 0;

        let currentInteractable = null;
        const raycaster = new THREE.Raycaster();
        const interactBtn = document.getElementById('interactBtn');
        const interactionPrompt = document.getElementById('interactionPrompt');

        const matWood = new THREE.MeshStandardMaterial({ color: 0xc48a4a, roughness: 0.8, flatShading: true });
        const matWall = new THREE.MeshStandardMaterial({ color: 0xe6d7c3, roughness: 0.9 });
        const matWainscot = new THREE.MeshStandardMaterial({ color: 0x5a3a2a, roughness: 0.7 });

        // ========================================================
        // SISTEMA DE SAVE E LOAD
        // ========================================================
        function saveGame() {
            if (isPaused) return;
            try {
                const data = { px: player.position.x, py: player.position.y, pz: player.position.z, yaw: player.yaw, pitch: player.pitch };
                localStorage.setItem('retroTapesSave', JSON.stringify(data));
            } catch(e) { console.error("Erro ao salvar", e); }
        }

        function loadGame() {
            try {
                const saved = localStorage.getItem('retroTapesSave');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data && typeof data.px === 'number' && typeof data.py === 'number' && typeof data.pz === 'number' && typeof data.yaw === 'number' && typeof data.pitch === 'number') {
                        player.position.set(data.px, data.py, data.pz);
                        player.yaw = data.yaw;
                        player.pitch = data.pitch;
                    }
                }
            } catch(e) { console.error("Erro ao carregar", e); }
        }

        // ========================================================
        // INICIALIZAÇÃO DA CENA
        // ========================================================
        function init() {
            try {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87ceeb);
                scene.fog = new THREE.Fog(0x87ceeb, 30, 80);

                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
                loadGame();
                camera.position.copy(player.position);

                renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = 1.2;
                document.body.appendChild(renderer.domElement);

                clock = new THREE.Clock();

                buildOutdoor();
                buildScene();
                setupEvents();

                setInterval(saveGame, 3000);
                animate();
            } catch(e) {
                console.error("Erro fatal ao inicializar:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px; font-family:monospace;">Erro ao iniciar: ${e.message}</div>`;
            }
        }

        // ========================================================
        // CONSTRUÇÃO DO CENÁRIO INTERNO
        // ========================================================
        function buildScene() {
            const ambient = new THREE.AmbientLight(0xffffff, 1.8);
            scene.add(ambient);

            const counterLight = new THREE.PointLight(0xffaa55, 2.5, 12, 1.5);
            counterLight.position.set(0, 3, -8);
            counterLight.castShadow = true;
            scene.add(counterLight);

            const fluors = [ {x:-4, z:0}, {x:4, z:0}, {x:0, z:-6} ];
            fluors.forEach(pos => {
                const light = new THREE.PointLight(0xffffff, 1.5, 14, 2);
                light.position.set(pos.x, 3.5, pos.z);
                scene.add(light);
                const fixture = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 0.5), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                fixture.position.set(pos.x, 3.9, pos.z);
                scene.add(fixture);
            });

            createFloor();
            createCeiling();
            createWalls();
            createShelves();
            createArcades();
            createCounter();
            createPosters();
        }

        function createFloor() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#5588bb'; ctx.fillRect(0, 0, 128, 128); 
            ctx.fillStyle = '#336699';
            for(let i=0; i<4; i++) for(let j=0; j<4; j++) {
                if((i+j)%2===0) ctx.fillRect(i*32, j*32, 32, 32);
            }
            ctx.strokeStyle = '#111'; ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, 128, 128);

            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(6, 6);

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({ map: tex, roughness: 0.9 }));
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = 0.1;
            floor.receiveShadow = true;
            scene.add(floor);
        }

        function createCeiling() {
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 1 }));
            ceil.rotation.x = Math.PI / 2;
            ceil.position.y = 4;
            scene.add(ceil);
        }

        function createWalls() {
            function buildWall(width, x, z, rotY, hasWindow = false) {
                const group = new THREE.Group();
                if(!hasWindow) {
                    const wall = new THREE.Mesh(new THREE.BoxGeometry(width, 4, 0.2), matWall);
                    group.add(wall);
                    const wains = new THREE.Mesh(new THREE.BoxGeometry(width, 1.2, 0.25), matWainscot);
                    wains.position.y = 0.6;
                    group.add(wains);
                } else {
                    const seg = width / 3;
                    const w1 = new THREE.Mesh(new THREE.BoxGeometry(seg, 4, 0.2), matWall); w1.position.x = -seg; group.add(w1);
                    const w3 = new THREE.Mesh(new THREE.BoxGeometry(seg, 4, 0.2), matWall); w3.position.x = seg; group.add(w3);
                    const wBottom = new THREE.Mesh(new THREE.BoxGeometry(seg, 1.2, 0.2), matWall); wBottom.position.y = 0.6; group.add(wBottom);
                    const wTop = new THREE.Mesh(new THREE.BoxGeometry(seg, 1.5, 0.2), matWall); wTop.position.y = 3.25; group.add(wTop);
                    const wains = new THREE.Mesh(new THREE.BoxGeometry(width, 1.2, 0.25), matWainscot);
                    wains.position.y = 0.6; group.add(wains);
                }
                group.position.set(x, 2, z);
                group.rotation.y = rotY;
                scene.add(group);
                const box = new THREE.Box3().setFromObject(group);
                box.expandByScalar(0.05);
                colliders.push(box);
            }

            buildWall(20, 0, -10, 0);
            
            const frontL = new THREE.Group();
            let wallL = new THREE.Mesh(new THREE.BoxGeometry(9, 4, 0.2), matWall); wallL.position.x = -5.5; frontL.add(wallL);
            let wainsL = new THREE.Mesh(new THREE.BoxGeometry(9, 1.2, 0.25), matWainscot); wainsL.position.set(-5.5, 0.6, 0); frontL.add(wainsL);
            frontL.position.set(0, 2, 10); scene.add(frontL);
            colliders.push(new THREE.Box3().setFromObject(frontL));

            const frontR = new THREE.Group();
            let wallR = new THREE.Mesh(new THREE.BoxGeometry(9, 4, 0.2), matWall); wallR.position.x = 5.5; frontR.add(wallR);
            let wainsR = new THREE.Mesh(new THREE.BoxGeometry(9, 1.2, 0.25), matWainscot); wainsR.position.set(5.5, 0.6, 0); frontR.add(wainsR);
            frontR.position.set(0, 2, 10); scene.add(frontR);
            colliders.push(new THREE.Box3().setFromObject(frontR));

            buildWall(20, -10, 0, Math.PI/2, true);
            buildWall(20, 10, 0, Math.PI/2, false);
        }

        function createShelves() {
            const tapeColors = [0xff2a6d, 0x05d9e8, 0xd1f7ff, 0xffd700, 0x8a2be2, 0xff4500, 0x32cd32];
            const shelfPositions = [ { x: -3, z: 2 }, { x: -3, z: -3 } ];

            shelfPositions.forEach(pos => {
                const group = new THREE.Group();
                const base = new THREE.Mesh(new THREE.BoxGeometry(3, 0.2, 1), matWood); base.position.y = 0.1; group.add(base);
                for(let i=0; i<3; i++) {
                    const shelf = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 1), matWood); shelf.position.y = 0.5 + (i * 0.5); group.add(shelf);
                }
                for(let row=0; row<3; row++) {
                    for(let i=0; i<8; i++) {
                        const tapeMat = new THREE.MeshStandardMaterial({ color: tapeColors[Math.floor(Math.random() * tapeColors.length)], roughness: 0.5 });
                        const tape = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.35, 0.1), tapeMat);
                        tape.position.set(-1.3 + (i * 0.36), 0.7 + (row * 0.5), 0.45);
                        group.add(tape);
                    }
                }
                group.position.set(pos.x, 0, pos.z);
                scene.add(group);
                colliders.push(new THREE.Box3().setFromObject(group));
                interactables.push({ mesh: group, name: "ESTANTE DE FILMES", type: 'shelf' });
            });

            for(let row=0; row<4; row++) {
                const shelf = new THREE.Mesh(new THREE.BoxGeometry(18, 0.1, 0.3), matWainscot);
                shelf.position.set(0, 1 + (row * 0.8), -9.7); scene.add(shelf);
                for(let i=0; i<30; i++) {
                    const coverMat = new THREE.MeshStandardMaterial({ color: tapeColors[Math.floor(Math.random() * tapeColors.length)], emissive: tapeColors[Math.floor(Math.random() * tapeColors.length)], emissiveIntensity: 0.3 });
                    const cover = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 0.05), coverMat);
                    cover.position.set(-8.8 + (i * 0.6), 1.3 + (row * 0.8), -9.55); scene.add(cover);
                }
            }
        }

        // ========================================================
        // FLIPERAMAS (ARCADES) - ROMS NA RAIZ
        // ========================================================
        function createArcades() {
            // Procura as ROMs no mesmo diretório do index.html
            const arcadeData = [
                { name: "ATARI 1", romUrl: "rom1.bin", color: 0xff00ff },
                { name: "ATARI 2", romUrl: "rom2.bin", color: 0x00ffff },
                { name: "ATARI 3", romUrl: "rom3.bin", color: 0xffff00 },
                { name: "ATARI 4", romUrl: "rom4.bin", color: 0x00ff00 }
            ];
            const zPositions = [-6, -2, 2, 6];

            arcadeData.forEach((data, index) => {
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.8, 1.2), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4, metalness: 0.3 }));
                body.position.y = 0.9; group.add(body);

                const marquee = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.4, 0.2), new THREE.MeshBasicMaterial({ color: data.color }));
                marquee.position.set(0, 2.0, -0.4); group.add(marquee);
                const mLight = new THREE.PointLight(data.color, 0.8, 3); mLight.position.set(0, 2.0, -0.2); group.add(mLight);

                const screen = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.6), new THREE.MeshBasicMaterial({ color: data.color }));
                screen.position.set(0, 1.4, 0.61); group.add(screen);

                const panel = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.1, 0.4), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                panel.position.set(0, 0.85, 0.45); group.add(panel);
                const stickBall = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
                stickBall.position.set(-0.3, 1.0, 0.45); group.add(stickBall);

                for(let i=0; i<3; i++) {
                    const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.05), new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 0.5 }));
                    btn.position.set(0.1 + (i * 0.18), 0.95, 0.45); group.add(btn);
                }

                group.position.set(9.5, 0, zPositions[index]);
                group.rotation.y = -Math.PI / 2; 
                scene.add(group);
                colliders.push(new THREE.Box3().setFromObject(group));
                interactables.push({ mesh: group, name: data.name, type: 'arcade', romUrl: data.romUrl });
            });
        }

        // ========================================================
        // BALCÃO E ATENDENTE
        // ========================================================
        function createCounter() {
            const group = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 1.5), matWainscot); base.position.y = 0.5; group.add(base);
            const top = new THREE.Mesh(new THREE.BoxGeometry(4.2, 0.1, 1.7), matWood); top.position.y = 1.05; group.add(top);
            
            const signMat = new THREE.MeshBasicMaterial({ color: 0xff2a6d });
            const sign = new THREE.Mesh(new THREE.BoxGeometry(2, 0.4, 0.1), signMat);
            sign.position.set(0, 1.5, -0.7); group.add(sign);

            const crtBody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            crtBody.position.set(-1, 1.5, -0.3); group.add(crtBody);
            const crtScreen = new THREE.Mesh(new THREE.PlaneGeometry(0.45, 0.35), new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
            crtScreen.position.set(-1, 1.5, -0.05); group.add(crtScreen);

            const keyboard = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.2), new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
            keyboard.position.set(-0.4, 1.18, 0.1); group.add(keyboard);

            const rack = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.3), matWood);
            rack.position.set(1.2, 1.3, -0.2); group.add(rack);
            const candyColors = [0xff0000, 0xffff00, 0x00ff00, 0x0000ff, 0xff00ff];
            for(let i=0; i<6; i++) {
                const candy = new THREE.Mesh(new THREE.SphereGeometry(0.06), new THREE.MeshStandardMaterial({ color: candyColors[i%5], emissive: candyColors[i%5], emissiveIntensity: 0.2 }));
                candy.position.set(1.0 + (i%3)*0.2, 1.55, -0.2 + Math.floor(i/3)*0.15); 
                group.add(candy);
            }

            group.position.set(0, 0, -8.5);
            scene.add(group);
            colliders.push(new THREE.Box3().setFromObject(group));
            interactables.push({ mesh: group, name: "BALCÃO DE ATENDIMENTO", type: 'counter' });

            createAttendant();
            createNPC(0x1565c0, 0x333333, new THREE.Vector3(-4, 0, 0), false);
        }

        function createAttendant() {
            const group = new THREE.Group();
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.8, flatShading: true });
            const hairMat = new THREE.MeshStandardMaterial({ color: 0x3a2718, roughness: 0.9 });
            const pantsMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });

            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.15), pantsMat); legL.position.set(-0.1, 0.4, 0); group.add(legL);
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.15), pantsMat); legR.position.set(0.1, 0.4, 0); group.add(legR);

            const torsoMat1 = new THREE.MeshStandardMaterial({ color: 0xcc1111, roughness: 0.8 });
            const torsoMat2 = new THREE.MeshStandardMaterial({ color: 0x331111, roughness: 0.8 });
            const torso = new THREE.Group();
            const t1 = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.6, 0.3), torsoMat1); t1.position.set(-0.125, 0, 0); torso.add(t1);
            const t2 = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.6, 0.3), torsoMat2); t2.position.set(0.125, 0, 0); torso.add(t2);
            torso.position.y = 1.1; group.add(torso);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.25, 0.25), skinMat); head.position.y = 1.6; group.add(head);
            const hair = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.3), hairMat); hair.position.y = 1.75; group.add(hair);
            const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.05, 6), new THREE.MeshStandardMaterial({color: 0x1565c0})); 
            cap.position.y = 1.78; group.add(cap);
            const capFront = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.03, 0.1), new THREE.MeshStandardMaterial({color: 0x1565c0})); 
            capFront.position.set(0, 1.76, 0.15); group.add(capFront);

            group.position.set(0, 0, -9.2);
            scene.add(group);
        }

        function createPosters() {
            const posterColors = [0xff2a6d, 0x05d9e8, 0x8a2be2, 0xffd700];
            const positions = [ { z: 5 }, { z: -3 } ];
            positions.forEach((pos, i) => {
                const poster = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2), new THREE.MeshBasicMaterial({ color: posterColors[i], side: THREE.DoubleSide }));
                poster.position.set(-9.8, 2.5, pos.z);
                poster.rotation.y = Math.PI / 2;
                scene.add(poster);
            });
        }

        // ========================================================
        // ÁREA EXTERNA
        // ========================================================
        function buildOutdoor() {
            const sunLight = new THREE.DirectionalLight(0xffffff, 3.0);
            sunLight.position.set(-10, 20, 20);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 1024; sunLight.shadow.mapSize.height = 1024;
            scene.add(sunLight);

            const outdoor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x666677, roughness: 1 }));
            outdoor.rotation.x = -Math.PI / 2; outdoor.position.y = 0; outdoor.receiveShadow = true;
            scene.add(outdoor);

            const sidewalk = new THREE.Mesh(new THREE.BoxGeometry(8, 0.2, 5), new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.8 }));
            sidewalk.position.set(0, 0.05, 12.5); scene.add(sidewalk);

            const wallMat = new THREE.MeshStandardMaterial({color: 0x888888});
            const b1 = new THREE.Mesh(new THREE.BoxGeometry(50, 1, 0.5), wallMat); b1.position.set(0, 0.5, 25); scene.add(b1); colliders.push(new THREE.Box3().setFromObject(b1));
            const b2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1, 30), wallMat); b2.position.set(-15, 0.5, 10); scene.add(b2); colliders.push(new THREE.Box3().setFromObject(b2));
            const b3 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1, 30), wallMat); b3.position.set(15, 0.5, 10); scene.add(b3); colliders.push(new THREE.Box3().setFromObject(b3));

            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 5), new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 }));
            pole.position.set(-5, 2.5, 15); scene.add(pole);
            const lampLight = new THREE.PointLight(0xffaa55, 1.5, 10, 2); lampLight.position.set(-5, 4.8, 15); scene.add(lampLight);
            const lampBulb = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0xffffaa}));
            lampBulb.position.set(-5, 4.7, 15); scene.add(lampBulb);

            for(let i=0; i<4; i++) {
                const tree = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1.5), new THREE.MeshStandardMaterial({color: 0x4a2f1d}));
                trunk.position.y = 0.75; tree.add(trunk);
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(1, 2.5, 6), new THREE.MeshStandardMaterial({color: 0x2e7d32, flatShading: true}));
                leaves.position.y = 2.5; tree.add(leaves);
                tree.position.set(-10 + (i * 7), 0, 18); scene.add(tree);
            }
        }

        // ========================================================
        // NPCS
        // ========================================================
        function createNPC(shirtColor, pantsColor, position, isAttendant = false) {
            const group = new THREE.Group();
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.8, flatShading: true });
            const shirtMat = new THREE.MeshStandardMaterial({ color: shirtColor, roughness: 0.8, flatShading: true });
            const pantsMat = new THREE.MeshStandardMaterial({ color: pantsColor, roughness: 0.8, flatShading: true });

            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.15), pantsMat); legL.position.set(-0.1, 0.4, 0); group.add(legL);
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.15), pantsMat); legR.position.set(0.1, 0.4, 0); group.add(legR);
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.3), shirtMat); torso.position.y = 1.1; group.add(torso);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.25, 0.25), skinMat); head.position.y = 1.6; group.add(head);

            group.position.copy(position); scene.add(group);

            if(!isAttendant) {
                group.userData = {
                    isWandering: true,
                    targetPos: new THREE.Vector3(position.x + (Math.random() - 0.5) * 6, 0, position.z + (Math.random() - 0.5) * 6),
                    speed: 0.8, waitTime: 0
                };
            }
        }

        function updateNPCs(dt) {
            scene.traverse(obj => {
                if(obj.userData && obj.userData.isWandering) {
                    if(obj.userData.waitTime > 0) { obj.userData.waitTime -= dt; return; }
                    const dir = new THREE.Vector3().subVectors(obj.userData.targetPos, obj.position); dir.y = 0;
                    if(dir.length() < 0.5) {
                        obj.userData.waitTime = 2 + Math.random() * 3;
                        obj.userData.targetPos = new THREE.Vector3((Math.random() - 0.5) * 16, 0, (Math.random() - 0.5) * 16);
                    } else {
                        dir.normalize(); obj.position.addScaledVector(dir, obj.userData.speed * dt);
                        obj.lookAt(obj.userData.targetPos.x, obj.position.y, obj.userData.targetPos.z);
                    }
                }
            });
        }

        // ========================================================
        // MOVIMENTAÇÃO E COLISÃO
        // ========================================================
        function checkCollision(newPos) {
            const playerBox = new THREE.Box3(
                new THREE.Vector3(newPos.x - player.radius, 0, newPos.z - player.radius),
                new THREE.Vector3(newPos.x + player.radius, player.height, newPos.z + player.radius)
            );
            for(let box of colliders) { if(box.intersectsBox(playerBox)) return true; }
            return false;
        }

        function updatePlayer(dt) {
            const speed = 4.0;
            let moveDir = new THREE.Vector3();
            const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
            const right = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));

            if(keys['w'] || keys['arrowup']) moveDir.add(forward);
            if(keys['s'] || keys['arrowdown']) moveDir.sub(forward);
            if(keys['d'] || keys['arrowright']) moveDir.add(right);
            if(keys['a'] || keys['arrowleft']) moveDir.sub(right);

            if(joystickActive) {
                moveDir.addScaledVector(forward, -joystickVector.y);
                moveDir.addScaledVector(right, joystickVector.x);
            }

            if(moveDir.lengthSq() > 0) {
                moveDir.normalize().multiplyScalar(speed * dt);
                let testPos = player.position.clone(); testPos.x += moveDir.x;
                if(!checkCollision(testPos)) player.position.x = testPos.x;
                testPos = player.position.clone(); testPos.z += moveDir.z;
                if(!checkCollision(testPos)) player.position.z = testPos.z;
            }

            camera.position.copy(player.position);
            camera.rotation.order = 'YXZ';
            camera.rotation.y = player.yaw;
            camera.rotation.x = player.pitch;
        }

        // ========================================================
        // INTERAÇÃO
        // ========================================================
        function checkInteraction() {
            if(isPaused) return;
            
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            raycaster.far = 3.5;
            const meshes = interactables.map(i => i.mesh);
            const intersects = raycaster.intersectObjects(meshes, true);

            if(intersects.length > 0) {
                let target = null;
                let parent = intersects[0].object;
                while(parent) {
                    target = interactables.find(i => i.mesh === parent);
                    if(target) break;
                    parent = parent.parent;
                }

                if(target) {
                    currentInteractable = target;
                    interactionPrompt.style.display = 'block';
                    interactBtn.style.display = 'flex';
                    
                    if(target.type === 'arcade') {
                        interactionPrompt.innerText = `JOGAR ${target.name} (ENTRAR)`;
                        interactionPrompt.style.color = "#ffd700";
                    } else {
                        interactionPrompt.innerText = "PRESSIONE [E] OU TOQUE EM INTERAGIR";
                        interactionPrompt.style.color = "#05d9e8";
                    }
                    return;
                }
            }
            currentInteractable = null;
            interactionPrompt.style.display = 'none';
            interactBtn.style.display = 'none';
        }

        function executeInteraction() {
            if(!currentInteractable) return;

            if(currentInteractable.type === 'arcade') {
                openArcade(currentInteractable.romUrl);
                return;
            }

            if(currentInteractable.type === 'shelf') {
                const movies = ["CYBORG NINJA 3: O RETORNO", "AVENTURA NO ESPAÇO 2", "TERRORES DA NOITE", "COMÉDIA ROMÂNTICA: AMOR EM VHS", "AÇÃO TOTAL 4K"];
                interactionPrompt.innerText = "VHS: " + movies[Math.floor(Math.random() * movies.length)];
                interactionPrompt.style.color = "#ff2a6d";
            } else if(currentInteractable.type === 'counter') {
                interactionPrompt.innerText = "ATENDENTE: 'Boa noite! Alugou algo bom hoje?'";
                interactionPrompt.style.color = "#ffd700";
            }
        }

        // ========================================================
        // SISTEMA DE FLIPERAMA ATARI
        // ========================================================
        function openArcade(romUrl) {
            isPaused = true;
            document.getElementById('hud').style.display = 'none';
            document.getElementById('arcadeOverlay').style.display = 'flex';
            
            if (document.pointerLockElement) document.exitPointerLock();

            if (window.Javatari) {
                try {
                    Javatari.fileLoader.loadFromURL(romUrl);
                } catch (e) {
                    console.log("ROM não encontrada. Aguardando arrastar arquivo.");
                }
            }
        }

        function closeArcade() {
            isPaused = false;
            document.getElementById('hud').style.display = 'block';
            document.getElementById('arcadeOverlay').style.display = 'none';
            
            if (window.Javatari) {
                Javatari.userInterrupt();
            }
            saveGame();
        }

        // ========================================================
        // ÁUDIO
        // ========================================================
        let audioCtx;
        function initAudio() {
            if(audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.value = 60; gain.gain.value = 0.02;
                osc.connect(gain).connect(audioCtx.destination); osc.start();
            } catch(e) { console.error("Audio init failed", e); }
        }

        // ========================================================
        // EVENTOS
        // ========================================================
        function setupEvents() {
            window.addEventListener('keydown', (e) => { 
                if(isPaused) return;
                keys[e.key.toLowerCase()] = true; 
                if(e.key.toLowerCase() === 'e') executeInteraction(); 
            });
            window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

            const canvas = renderer.domElement;
            canvas.addEventListener('click', () => { if(document.pointerLockElement !== canvas) canvas.requestPointerLock(); });

            document.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement === canvas) {
                    player.yaw -= e.movementX * 0.002; player.pitch -= e.movementY * 0.002;
                    player.pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, player.pitch));
                }
            });

            canvas.addEventListener('touchstart', (e) => {
                initAudio();
                for(let touch of e.changedTouches) {
                    if(touch.clientX > window.innerWidth / 2 && touchLookId === null) {
                        touchLookId = touch.identifier; lastTouchX = touch.clientX; lastTouchY = touch.clientY;
                    }
                }
            }, { passive: true });

            canvas.addEventListener('touchmove', (e) => {
                for(let touch of e.changedTouches) {
                    if(touch.identifier === touchLookId) {
                        const dx = touch.clientX - lastTouchX; const dy = touch.clientY - lastTouchY;
                        player.yaw -= dx * 0.005; player.pitch -= dy * 0.005;
                        player.pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, player.pitch));
                        lastTouchX = touch.clientX; lastTouchY = touch.clientY;
                    }
                }
            }, { passive: true });

            canvas.addEventListener('touchend', (e) => { for(let touch of e.changedTouches) { if(touch.identifier === touchLookId) touchLookId = null; } });

            const joyArea = document.getElementById('joystickArea');
            const joyKnob = document.getElementById('joystickKnob');
            
            joyArea.addEventListener('touchstart', (e) => { e.preventDefault(); joystickActive = true; initAudio(); });
            joyArea.addEventListener('touchmove', (e) => {
                e.preventDefault(); const touch = e.touches[0]; const rect = joyArea.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
                let dx = touch.clientX - centerX; let dy = touch.clientY - centerY;
                const dist = Math.sqrt(dx*dx + dy*dy); const maxDist = rect.width / 2;
                if(dist > maxDist) { dx = (dx/dist) * maxDist; dy = (dy/dist) * maxDist; }
                joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joystickVector.x = dx / maxDist; joystickVector.y = dy / maxDist;
            });
            joyArea.addEventListener('touchend', () => { joystickActive = false; joystickVector = { x: 0, y: 0 }; joyKnob.style.transform = 'translate(-50%, -50%)'; });

            interactBtn.addEventListener('touchstart', (e) => { e.preventDefault(); executeInteraction(); });

            const fsBtn = document.getElementById('fullscreenBtn');
            fsBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                } else {
                    document.exitFullscreen();
                }
            });

            document.getElementById('exitArcadeBtn').addEventListener('click', closeArcade);

            window.addEventListener('beforeunload', saveGame);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // ========================================================
        // LOOP
        // ========================================================
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            
            if(!isPaused) {
                updatePlayer(dt);
                updateNPCs(dt);
                checkInteraction();
            }
            
            renderer.render(scene, camera);
        }

        // ========================================================
        // INICIALIZAÇÃO
        // ========================================================
        init();

        const loadingScreen = document.getElementById('loadingScreen');
        loadingScreen.style.opacity = '0';
        setTimeout(() => { loadingScreen.style.display = 'none'; }, 1000);

    </script>
</body>
